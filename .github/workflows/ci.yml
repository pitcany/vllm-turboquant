name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.14.4

      - name: ruff check
        run: ruff check .

  unit-tests:
    name: pytest (unit, ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + test extras (CPU torch)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel to avoid pulling the multi-GB CUDA build
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1"
          pip install -e .[test]

      - name: Show env
        run: |
          python --version
          pip list | grep -E "^(torch|numpy|scipy|pytest|turboquant) "

      - name: Run unit tests (CPU only)
        run: pytest -m unit -ra
